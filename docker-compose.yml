services:
  nyshare:
    image: ghcr.io/nikolainyegaard/nyshare:latest
    container_name: nyshare
    environment:
      # Admin panel at /admin. Credentials are generated on first launch and
      # printed to the container output (docker logs nyshare); OIDC is
      # configured in the panel's Authentication section.
      # Locked out? Uncomment, restart, sign in with the printed credentials,
      # then remove it again:
      # - AUTH_RESET=1
      # trust the Caddy reverse proxy (private docker subnet) so admin/activity logs show real client IPs
      - PSITRANSFER_TRUST_PROXY=uniquelocal
    volumes:
      - ./data:/data
    networks:
      - proxy-fileshare
    restart: unless-stopped

networks:
  proxy-fileshare:
    external: true
