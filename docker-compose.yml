services:
  nyshare:
    image: ghcr.io/nikolainyegaard/nyshare:latest
    container_name: nyshare
    environment:
      # Admin panel at /admin. Enabled when a password or OIDC is configured.
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
      # Optional OIDC login (Authentik, Keycloak, Pocket ID, ...):
      # - OIDC_DISCOVERY_URL=https://auth.example.com/application/o/nyshare/.well-known/openid-configuration
      # - OIDC_CLIENT_ID=
      # - OIDC_CLIENT_SECRET=
      # trust the Caddy reverse proxy (private docker subnet) so admin/activity logs show real client IPs
      - PSITRANSFER_TRUST_PROXY=uniquelocal
    volumes:
      - ./data:/data
    networks:
      - proxy-fileshare
    restart: unless-stopped

networks:
  proxy-fileshare:
    external: true
