services:
  nyshare:
    image: ghcr.io/nikolainyegaard/nyshare:latest
    container_name: nyshare
    environment:
      # Admin panel at /admin. OIDC login is configured in the panel itself
      # (Authentication section); the password here is also the fallback if
      # the OIDC provider breaks.
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
      # trust the Caddy reverse proxy (private docker subnet) so admin/activity logs show real client IPs
      - PSITRANSFER_TRUST_PROXY=uniquelocal
    volumes:
      - ./data:/data
    networks:
      - proxy-fileshare
    restart: unless-stopped

networks:
  proxy-fileshare:
    external: true
